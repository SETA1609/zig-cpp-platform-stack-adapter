name: CI

# Runs on every push (any branch) and every PR. The `Test (contract)` step is
# the merge gate: enable it as a required status check in branch protection for
# `main` so a PR can't merge until it's green on all three OSes.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    name: build · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true

      - run: zig version

      # Format gate — runs on every OS. `.gitattributes` (eol=lf) keeps the
      # Windows checkout LF so this passes there too. Explicit paths so no
      # generated dir (.zig-cache) is scanned.
      - name: Format check
        run: zig fmt --check build.zig build.zig.zon src demo

      # Compiles SDL3 once into the static artifact (+ the demo + test exes).
      - name: Build
        run: zig build

      # Pure-data smoke demo (no window / no GPU) — runs headless to a clean exit.
      - name: Run smoke demo
        run: zig build run

      # Merge gate: contract / data tests (enum values, struct defaults, type
      # layout) — need no backend. The behavioral `test-tdd` suite needs a real
      # display server and is intentionally off-CI (see CONTRIBUTING.md).
      - name: Test (contract)
        run: zig build test
