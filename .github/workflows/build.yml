name: CI

# Runs on every push (any branch) and every PR. The `build` job is the merge
# gate: make it a required status check in branch protection for `main`. The
# actual checks live in scripts/ci.sh (single source of truth, runnable locally).
on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: these workflows only check out + build; no writes needed.
permissions:
  contents: read

defaults:
  run:
    shell: bash # so scripts/ci.sh runs on the Windows runner too

jobs:
  build:
    name: build · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true

      - run: zig version

      # fmt + build + smoke demo + contract tests. `.gitattributes` (eol=lf)
      # keeps the Windows checkout LF so the fmt gate passes there too. The
      # behavioral test-tdd suite needs a real display and is off-CI.
      - name: CI checks
        run: bash scripts/ci.sh
