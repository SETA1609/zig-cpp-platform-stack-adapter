name: CI

# Runs on every push (any branch) and every PR. The `build` job is the merge
# gate: make it a required status check in branch protection for `main`. The
# actual checks live in scripts/ci.sh (single source of truth, runnable locally).
on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: these workflows only check out + build; no writes needed.
permissions:
  contents: read

defaults:
  run:
    shell: bash # so scripts/ci.sh runs on the Windows runner too

jobs:
  # Lint the workflow YAML itself for safety (structure, action pinning,
  # injection, least-privilege) using the vendored validator under
  # .claude/skills/check-workflows — also a Claude Code skill.
  lint-workflows:
    name: lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PyYAML
        run: python3 -c "import yaml" 2>/dev/null || python3 -m pip install --break-system-packages --quiet pyyaml
      - name: Validate workflow YAML (--strict)
        run: python3 .claude/skills/check-workflows/validate_workflows.py --strict

  build:
    name: build · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # macOS is contributor-led (the author has no mac hardware): visible but
    # non-blocking, so a mac-only break never gates a merge.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true

      - run: zig version

      # fmt + build + smoke demo + contract tests. `.gitattributes` (eol=lf)
      # keeps the Windows checkout LF so the fmt gate passes there too. The
      # behavioral test-tdd suite needs a display + GL — it runs in the
      # display-tests job below (Xvfb + Mesa software GL).
      - name: CI checks
        run: bash scripts/ci.sh

  # Headless display coverage: the behavioral test-tdd suite under Xvfb + Mesa
  # llvmpipe (software GL). It needs a display (window creation) and GL (the v0.6
  # GL-context tests). Software GL is reliable, so this GATES.
  display-tests:
    name: test-tdd (xvfb + software GL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true
      - name: Install Xvfb + Mesa software GL + software Vulkan
        run: sudo apt-get update && sudo apt-get install -y xvfb mesa-utils libgl1-mesa-dri libglx-mesa0 mesa-vulkan-drivers libvulkan1
      - name: test-tdd under Xvfb (llvmpipe + lavapipe)
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: xvfb-run -a zig build test-tdd
